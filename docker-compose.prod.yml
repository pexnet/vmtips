services:
  app:
    image: ghcr.io/pexnet/vmtips:latest
    container_name: vmtips
    ports:
      - "8000:8000"
    # The non-root appuser (uid 1000) inside the container needs to own
    # the host bind-mount directory, otherwise SQLite cannot open the file.
    # Run `mkdir -p ./data` on the host before `docker compose up -d`
    # the first time, or use scripts/dev.sh up which does it for you.
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=sqlite:////data/vmtips.db
      - ENVIRONMENT=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=168
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - START_USERS_FILE=/data/start_users.json
      - WORLD_CUP_JSON_URL=https://worldcupjson.net/matches
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - STATIC_DIR=/app/static
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
